<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    margin: 0;
    background: black;
}

/* disable klik kanan */
body {
    -webkit-user-select: none;
    user-select: none;
}

.pdf-container {
    width: 100vw;
    height: 100vh;
}

embed {
    width: 100%;
    height: 100%;
}
</style>

<div class="pdf-container">
    <embed src="/file/{{ filename }}#toolbar=0" type="application/pdf">
</div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
